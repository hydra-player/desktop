name: Next Channel

on:
  push:
    branches: [next]
  workflow_dispatch:

jobs:
  publish-next:
    uses: ./.github/workflows/reusable-channel-publish.yml
    with:
      channel: next
      source_ref: ${{ github.ref_name }}
      target_branch: next
      prerelease: true
      draft_release: false
      verify_nix: true
    secrets: inherit
